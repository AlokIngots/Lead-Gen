upstream alok_lms_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name lms.alokindia.co.in;

    # Redirect to HTTPS once certbot has provisioned certs
    # return 301 https://$host$request_uri;

    root /var/www/alok_lms/frontend;
    index index.html;

    client_max_body_size 50M;

    # Static frontend (Vite build output)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy
    location /api/ {
        proxy_pass         http://alok_lms_backend/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 300s;
    }

    location /health {
        proxy_pass http://alok_lms_backend/health;
    }

    access_log /var/log/nginx/alok_lms.access.log;
    error_log  /var/log/nginx/alok_lms.error.log;
}

