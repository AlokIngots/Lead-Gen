upstream alok_lms_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

# Redirect all HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name lms.alokindia.co.in;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name lms.alokindia.co.in;

    # TLS — update paths after running certbot
    ssl_certificate     /etc/letsencrypt/live/lms.alokindia.co.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lms.alokindia.co.in/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://lms.alokindia.co.in;" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    root /var/www/alok_lms/frontend;
    index index.html;

    client_max_body_size 20M;

    # Static frontend (Vite build output)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy
    location /api/ {
        proxy_pass         http://alok_lms_backend/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 300s;
    }

    location /health {
        proxy_pass http://alok_lms_backend/health;
    }

    access_log /var/log/nginx/alok_lms.access.log;
    error_log  /var/log/nginx/alok_lms.error.log;
}
